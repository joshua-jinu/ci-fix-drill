name: CI Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci   # Use `npm ci` for reproducible installs using package-lock.json

  test:
    runs-on: ubuntu-latest
    # Ensure this job runs after `install` to avoid parallel execution.
    needs: install
    steps:
      # Checkout and setup Node again — each job runs on a fresh runner.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies (test job)
        run: npm ci
      - name: Run tests
        run: npm test

# Notes:
# - `npm ci` is used to ensure the install is reproducible and uses `package-lock.json`.
# - `needs: install` guarantees ordering, and the test job still runs `npm ci` because
#   each GitHub Actions job starts on a fresh runner and does not inherit `node_modules`.
